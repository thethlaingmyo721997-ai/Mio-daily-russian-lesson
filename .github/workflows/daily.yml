name: Send Daily Lessons

on:
  schedule:
    # မနက် ၉:၃၀ (UTC 3:00)
    - cron: '0 3 * * *'
    # နေ့လည် ၁၂:၃၀ (UTC 6:00)
    - cron: '0 6 * * *'
    # ညနေ ၃:၃၀ (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-lesson:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4  # ဒီနေရာကို ပြင်လိုက်ပါပြီ
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
