name: Send Daily Lessons

on:
  schedule:
    # မြန်မာစံတော်ချိန် မနက် ၈:၃၀၊ နေ့လယ် ၂:၃၀၊ ည ၈:၃၀ (ခန့်မှန်းခြေ)
    - cron: '0 2 * * *'   # 8:30 AM MMT
    - cron: '0 8 * * *'   # 2:30 PM MMT
    - cron: '0 14 * * *'  # 8:30 PM MMT
  workflow_dispatch:      # Manual နှိပ်လို့ရအောင် ထားထားခြင်း

jobs:
  send-lesson:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
