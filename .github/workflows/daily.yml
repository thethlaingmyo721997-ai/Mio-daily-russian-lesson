name: Mio Russian Daily Lessons

on:
  schedule:
    # တစ်နာရီတစ်ခါ (မိနစ် ၃၀ တိုင်းမှာ) Run ရန်
    - cron: '30 * * * *'
  workflow_dispatch: # ကိုယ်တိုင် နှိပ်ပြီး Run လို့ရအောင် ထားခြင်း

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
