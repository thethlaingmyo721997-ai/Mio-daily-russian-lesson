name: Send Daily Lessons

on:
  schedule:
    # မနက် ၉:၀၀ (UTC 2:30)
    - cron: '30 2 * * *'
    # နေ့လည် ၁၂:၀၀ (UTC 5:30)
    - cron: '30 5 * * *'
    # ညနေ ၃:၀၀ (UTC 8:30)
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  send-lesson:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: ambassadors/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
